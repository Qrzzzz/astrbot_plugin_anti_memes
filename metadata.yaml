name: "astrbot_plugin_anti_memes"
author: "Qrzzzz"
version: "1.1.0"
display_name: "图片精准撤回助手"
short_desc: "按群聊与用户规则自动撤回目标图片消息，支持 dry-run、诊断和 WebUI 配置。"
desc: |-
  仅支持 QQ / OneBot v11 / aiocqhttp。
  插件用于群管理场景，按群号+用户规则自动检测图片并尝试撤回。
  需要 bot 在目标群具备撤回权限；请勿用于骚扰、滥用或违规用途。
repo: "https://github.com/Qrzzzz/astrbot_plugin_anti_memes"
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.16,<5"

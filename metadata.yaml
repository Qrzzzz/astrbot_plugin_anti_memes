name: "astrbot_plugin_anti_memes" # ⚠️ 必填项：插件的标识包名，必须与所在文件夹的名称完全一致
author: "Qrzzzz"                    # 必填项：作者名
version: "1.0.0"                      # 必填项：版本号
description: |
  【仅支持基于 QQ 的 aiohttp / OneBot V11 平台】该插件基于 AstrBot，用于对指定用户发送的图片进行自动检测并触发撤回操作（需权限支持），适用于内容管理与群组秩序维护。支持自定义目标用户与规则配置。
  (Only supports QQ platforms based on aiohttp / OneBot V11.)This plugin for AstrBot monitors images sent by specified users and automatically recalls them (with proper permissions). It is designed for moderation and group management, with configurable targets and rules.
display_name: "图片精准撤回助手"          # 选填：在 AstrBot 管理面板和插件市场显示的友好名称，建议填写
repo: "https://github.com/Qrzzzz/astrbot_plugin_anti_memes"
support_platforms:                    # 选填：声明该插件支持的底层平台
  - QQ
astrbot_version: ">=4.16"             # 选填：声明该插件依赖的 AstrBot 最低版本（遵循 PEP 440 格式，不带 v 前缀）
